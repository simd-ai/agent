# ══════════════════════════════════════════════════════════════
# Publish container images to GitHub Container Registry (GHCR)
# ══════════════════════════════════════════════════════════════
# Triggers:
#   - push to main      → ghcr.io/simd-ai/agent:latest
#   - tag v*.*.*        → ghcr.io/simd-ai/agent:vX.Y.Z + :latest
#
# This workflow only builds the agent image. The frontend and
# runner images are built by their own repos:
#   - simd-ai/ui      → ghcr.io/simd-ai/ui
#   - simd-ai/runner  → ghcr.io/simd-ai/runner
#
# To push to GHCR the workflow needs write access on packages.
# Grant it once in Settings → Actions → General → Workflow
# permissions → "Read and write permissions".
# ══════════════════════════════════════════════════════════════

name: publish-images

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  agent:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/simd-ai/agent
          tags: |
            # latest on main
            type=raw,value=latest,enable={{is_default_branch}}
            # version tags from git tags
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            # always include the short SHA
            type=sha,prefix=sha-,format=short

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/agent.Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
