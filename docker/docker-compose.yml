# ══════════════════════════════════════════════════════════════
# SIMD Agent — Full Stack
# ══════════════════════════════════════════════════════════════
# Usage:
#   docker compose -f docker/docker-compose.yml up -d
#
# Or via the wrapper (recommended for first-time setup):
#   ./install.sh
#
# The wrapper generates .env from .env.example and prompts for your
# Gemini key (or Vertex / Ollama credentials).
#
# Images are pulled from GitHub Container Registry. To build from
# source instead (for development), uncomment the `build:` blocks
# and comment out the `image:` lines. See:
#   - simd-ai/agent   (this repo, the agent)
#   - simd-ai/ui      (Next.js frontend)
#   - simd-ai/runner  (OpenFOAM runner)
# ══════════════════════════════════════════════════════════════

services:
  # ── Postgres ─────────────────────────────────────────────────
  # Only started when the ``postgres`` profile is active.  The default
  # database is SQLite (a single file under ~/.simd/), so a fresh
  # install needs no Postgres service — bring it up with
  # ``docker compose --profile postgres up -d`` if you've chosen the
  # bundled-Postgres path in install.sh.
  postgres:
    image: postgres:16-alpine
    profiles: ["postgres"]
    environment:
      POSTGRES_USER: simd
      POSTGRES_PASSWORD: simd
      POSTGRES_DB: simd
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U simd"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # ── SIMD Agent (backend API) ─────────────────────────────────
  agent:
    image: ghcr.io/simd-ai/agent:latest
    # build:
    #   context: ..
    #   dockerfile: docker/agent.Dockerfile
    env_file: ../.env
    environment:
      # DATABASE_URL is read from ../.env (written by install.sh).
      # Default falls back to a bind-mounted SQLite file so the
      # stack still boots if .env is missing.
      DATABASE_URL: ${DATABASE_URL:-sqlite+aiosqlite:////data/simd.db}
      SIMULATION_SERVER_URL: http://runner:9000
    ports:
      - "8000:8000"
    volumes:
      - agent-storage:/app/storage
      - agent-progress:/tmp/simd_progress
      # SQLite default — bind the host's ~/.simd/ into the container
      # so the DB file survives container restarts and is readable
      # by the host-side CLI.  Harmless when DATABASE_URL points
      # at Postgres (the dir is just unused).
      - ${HOME}/.simd:/data
      # Mount a service-account JSON if using Vertex or GCS:
      # - ./gcp-sa.json:/secrets/sa-key.json:ro
    restart: unless-stopped

  # ── Frontend (Next.js) ───────────────────────────────────────
  frontend:
    # Auto-built by simd-ai/ui's GHA workflow on every push to main.
    # 355 MB standalone image; defaults to local mode (no Stripe / no
    # auth / no email).  Cloud deployments override at runtime.
    image: ghcr.io/simd-ai/ui:latest
    # To build locally from a sibling clone instead, comment the image
    # line above and uncomment this block:
    # build:
    #   context: ../../ui
    #   dockerfile: Dockerfile
    environment:
      NEXT_PUBLIC_MODE: ${NEXT_PUBLIC_MODE:-local}
      NEXT_PUBLIC_AGENT_URL: http://localhost:8000
      NEXT_PUBLIC_AGENT_WS_URL: ws://localhost:8000
      NEXT_PUBLIC_AUTH_DISABLED: "true"
    ports:
      - "3000:3000"
    depends_on:
      - agent
    restart: unless-stopped

  # ── OpenFOAM Runner ──────────────────────────────────────────
  runner:
    image: ghcr.io/simd-ai/runner:latest
    # To build from source, clone simd-ai/runner
    # beside this repo and uncomment the build block:
    # build:
    #   context: ../../runner
    volumes:
      - runner-data:/tmp/simd-runs
    ports:
      - "9000:9000"
    restart: unless-stopped

volumes:
  pgdata:
  agent-storage:
  agent-progress:
  runner-data:
