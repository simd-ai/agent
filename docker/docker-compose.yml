# ══════════════════════════════════════════════════════════════
# SIMD Agent — Full Stack
# ══════════════════════════════════════════════════════════════
# Usage:
#   docker compose -f docker/docker-compose.yml up -d
#
# Or via the wrapper (recommended for first-time setup):
#   ./install.sh
#
# The wrapper generates .env from .env.example and prompts for your
# Gemini key (or Vertex / Ollama credentials).
#
# Images are pulled from GitHub Container Registry. To build from
# source instead (for development), uncomment the `build:` blocks
# and comment out the `image:` lines. See:
#   - simd-ai/simd-agent       (this repo, the agent)
#   - simd-ai/simd-agent-ui    (Next.js frontend)
#   - simd-ai/simd-agent-simulation  (OpenFOAM runner)
# ══════════════════════════════════════════════════════════════

services:
  # ── Postgres ─────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: simd
      POSTGRES_PASSWORD: simd
      POSTGRES_DB: simd
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U simd"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # ── SIMD Agent (backend API) ─────────────────────────────────
  agent:
    image: ghcr.io/simd-ai/agent:latest
    # build:
    #   context: ..
    #   dockerfile: docker/agent.Dockerfile
    env_file: ../.env
    environment:
      DATABASE_URL: postgresql+asyncpg://simd:simd@postgres:5432/simd
      SIMULATION_SERVER_URL: http://runner:9000
    ports:
      - "8000:8000"
    volumes:
      - agent-storage:/app/storage
      - agent-progress:/tmp/simd_progress
      # Mount a service-account JSON if using Vertex or GCS:
      # - ./gcp-sa.json:/secrets/sa-key.json:ro
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # ── Frontend (Next.js) ───────────────────────────────────────
  frontend:
    image: ghcr.io/simd-ai/agent-ui:latest
    # To build from source, clone simd-ai/simd-agent-ui beside this
    # repo and uncomment the build block:
    # build:
    #   context: ../../simd-agent-ui
    env_file: ../.env
    environment:
      DATABASE_URL: postgresql://simd:simd@postgres:5432/simd
      NEXT_PUBLIC_AGENT_URL: http://localhost:8000
      NEXT_PUBLIC_AGENT_WS_URL: ws://localhost:8000
      NEXT_PUBLIC_AUTH_DISABLED: "true"
    ports:
      - "3000:3000"
    depends_on:
      - agent
    restart: unless-stopped

  # ── OpenFOAM Runner ──────────────────────────────────────────
  runner:
    image: ghcr.io/simd-ai/agent-runner:latest
    # To build from source, clone simd-ai/simd-agent-simulation
    # beside this repo and uncomment the build block:
    # build:
    #   context: ../../simd-agent-simulation
    volumes:
      - runner-data:/tmp/simd-runs
    ports:
      - "9000:9000"
    restart: unless-stopped

volumes:
  pgdata:
  agent-storage:
  agent-progress:
  runner-data:
